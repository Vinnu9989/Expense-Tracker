<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <div class="balance">
            <h2>Your Balance</h2>
            <span id="balance">$0.00</span>
        </div>
        <div class="income-expense">
            <div>
                <h3>Income</h3>
                <span id="income">+$0.00</span>
            </div>
            <div>
                <h3>Expense</h3>
                <span id="expense">-$0.00</span>
            </div>
        </div>
        <h3>Add New Transaction</h3>
        <form id="form">
            <input type="text" id="text" placeholder="Enter Description" required />
            <input type="number" id="amount" placeholder="Amount (positive for income, negative for expense)" required />
            <button type="submit">Add Transaction</button>
        </form>
        <h3>History</h3>
        <ul id="list" class="list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
